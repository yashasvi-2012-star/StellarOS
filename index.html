<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StellarOS</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#050816;
            color:white;
            font-family:Arial,sans-serif;
            text-align:center;
        }

        h1{
            font-size:4rem;
            margin-bottom:10px;
        }

        p{
            font-size:1.2rem;
            max-width:600px;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            border-radius:25px;
            background:#00bfff;
            color:white;
            cursor:pointer;
            font-size:1rem;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="topbar">
    <h2>🚀 StellarOS</h2>
    <span id="clock"></span>
</div>

<div class="window">
    <div class="planet"></div>
</div>

<h1>StellarOS</h1>

<p>
    Navigate the cosmos from your spacecraft.
    Discover stars, planets, nebulae, and distant galaxies.
</p>

<button onclick="openMap()">
    Launch Navigation System
</button>

<div id="map" class="hidden">
    <h2>Cosmic Map</h2>

    <div class="star"
         onclick="showInfo('Sirius','8.6 light years away')">
        ★
    </div>

    <div id="info"></div>
</div>

<script>
function openMap(){
    document.getElementById("map").classList.remove("hidden");
}

function showInfo(name,distance){
    document.getElementById("info").innerHTML =
    `<h3>${name}</h3>
     <p>${distance}</p>`;
}

function updateClock(){
    const now=new Date();
    document.getElementById("clock").innerText=
    now.toLocaleTimeString();
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
