<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StellarOS</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#050816;
            color:white;
            font-family:Arial,sans-serif;
            text-align:center;
        }

        h1{
            font-size:4rem;
            margin-bottom:10px;
        }

        p{
            font-size:1.2rem;
            max-width:600px;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            border-radius:25px;
            background:#00bfff;
            color:white;
            cursor:pointer;
            font-size:1rem;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <h1>🚀 StellarOS</h1>

    <p>
        Welcome to StellarOS.
        Explore stars, planets, and galaxies through
        an interactive mission-control experience.
    </p>

    <button onclick="alert('Star map coming soon!')">
        Start Exploring
    </button>

</body>
</html>
