<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StellarOS</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:#050816;
            color:white;
            font-family:Arial,sans-serif;
            text-align:center;
            overflow:hidden;
        }

        h1{
            font-size:4rem;
            margin-bottom:10px;
        }

        p{
            font-size:1.2rem;
            max-width:600px;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            border-radius:25px;
            background:#00bfff;
            color:white;
            cursor:pointer;
            font-size:1rem;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }

        /* TOP BAR */
        .topbar{
            position:absolute;
            top:0;
            width:100%;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            background:rgba(0,0,0,0.4);
            font-size:1rem;
        }

        /* PLANET WINDOW */
        .window{
            width:350px;
            height:350px;
            border:8px solid #888;
            border-radius:50%;
            overflow:hidden;
            margin-bottom:20px;
            background:radial-gradient(circle,#091540,#000);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .planet{
            width:120px;
            height:120px;
            border-radius:50%;
            background:linear-gradient(#4facfe,#00f2fe);
            animation:float 3s ease-in-out infinite;
        }

        @keyframes float{
            0%,100%{ transform:translateY(0px); }
            50%{ transform:translateY(-15px); }
        }

        /* MAP */
        .hidden{
            display:none;
        }

        #map{
            margin-top:20px;
        }

        .star{
            font-size:40px;
            cursor:pointer;
            margin-top:20px;
            transition:0.3s;
        }

        .star:hover{
            transform:scale(1.3);
        }

        #info{
            margin-top:10px;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h2>🚀 StellarOS</h2>
    <span id="clock"></span>
</div>

<!-- PLANET VIEW -->
<div class="window">
    <div class="planet"></div>
</div>

<h1>StellarOS</h1>

<p>
    Navigate the cosmos from your spacecraft.
    Discover stars, planets, nebulae, and distant galaxies.
</p>

<button onclick="openMap()">
    Launch Navigation System
</button>

<!-- COSMIC MAP -->
<div id="map" class="hidden">
    <h2>Cosmic Map</h2>

    <div class="star" onclick="showInfo('Sirius','8.6 light years away')">
        ★ Sirius
    </div>

    <div id="info"></div>
</div>

<script>
function openMap(){
    document.getElementById("map").classList.remove("hidden");
}

function showInfo(name,distance){
    document.getElementById("info").innerHTML =
    `<h3>${name}</h3><p>${distance}</p>`;
}

function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerText =
    now.toLocaleTimeString();
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
